publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5+1
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^5.1.0
